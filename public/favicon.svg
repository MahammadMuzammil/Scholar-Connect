<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0e6b34"/>
    </linearGradient>
  </defs>

  <!-- Rounded green tile background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Mosque dome -->
  <path
    d="M 32 18
       C 22 18 18 26 18 32
       L 18 48
       L 46 48
       L 46 32
       C 46 26 42 18 32 18 Z"
    fill="#fff7ed"
  />
  <!-- Doorway (so the silhouette reads as a building, not a blob) -->
  <path
    d="M 28 48
       L 28 40
       Q 32 36 36 40
       L 36 48 Z"
    fill="#0e6b34"
  />

  <!-- Crescent moon above the dome -->
  <g transform="translate(32 11)">
    <circle r="6" fill="#fde68a"/>
    <circle cx="2.2" cy="-1" r="5" fill="url(#bg)"/>
  </g>
</svg>
